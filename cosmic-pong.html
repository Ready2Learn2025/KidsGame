<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="ios-app.js"></script>
<title>Cosmic Pong!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(ellipse at 50% 20%, #1a1060 0%, #080820 65%, #030310 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Arial Rounded MT Bold', 'Arial Black', Arial, sans-serif;
    overflow: hidden; user-select: none;
  }
  #home-link {
    position: fixed; top: 16px; left: 16px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.4);
    color: #FFD700; text-decoration: none; font-size: 15px;
    padding: 8px 18px; border-radius: 30px; z-index: 50;
  }
  #home-link:hover { background: rgba(255,215,0,0.18); }

  #title {
    color: #FFD700; font-size: 1.9rem;
    text-shadow: 0 0 22px rgba(255,200,0,0.6), 0 3px 0 rgba(0,0,0,0.5);
    margin-bottom: 8px; letter-spacing: 4px;
  }
  #score-row { display: flex; justify-content: center; align-items: center; gap: 16px; width: 820px; max-width: 96vw; padding: 6px 0 4px; }
  .score-box {
    background: rgba(255,255,255,0.08); border: 2px solid rgba(255,215,0,0.4);
    border-radius: 10px; padding: 4px 20px; color: #FFD700; font-size: 1.5rem;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6); min-width: 80px; text-align: center;
  }
  .score-label { font-size: 0.65rem; color: #aab; display: block; letter-spacing: 1px; }
  #vs { color: #6a6ab0; font-size: 1rem; }

  #game-area {
    position: relative; width: min(820px, 96vw); aspect-ratio: 820 / 500; max-width: 96vw;
    background: linear-gradient(160deg, #11103a 0%, #070718 100%);
    border: 6px solid #534AB7; border-radius: 16px;
    box-shadow: 0 0 50px rgba(120,100,255,0.35), inset 0 2px 0 rgba(255,255,255,0.08);
    overflow: hidden; cursor: none; touch-action: none;
  }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  #message {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
    font-size: 2rem; color: #FFD700;
    text-shadow: 0 3px 0 #000, 0 0 20px rgba(255,215,0,0.8);
    text-align: center; pointer-events: none; opacity: 0; transition: opacity 0.3s;
    z-index: 10; white-space: nowrap;
  }
  #start-screen {
    position: absolute; inset: 0; background: rgba(5,5,20,0.9);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; gap: 18px; border-radius: 10px; padding: 20px;
  }
  #start-screen h2 { color: #FFD700; font-size: 2.1rem; text-shadow: 0 0 18px rgba(255,200,0,0.6); text-align: center; }
  #start-screen p { color: #cdd; font-size: 1.05rem; text-align: center; line-height: 2; }
  #start-btn {
    background: linear-gradient(180deg, #7F77DD 0%, #4a42b0 100%);
    color: #FFD700; border: 4px solid #FFD700;
    padding: 14px 44px; font-size: 1.5rem; font-family: inherit; border-radius: 40px;
    cursor: pointer; box-shadow: 0 6px 0 #2c2870, 0 8px 20px rgba(0,0,0,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #start-btn:hover  { transform: translateY(-2px); }
  #start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #2c2870; }
  @media (max-width: 560px) {
    body { justify-content: flex-start; padding-top: 56px; }
    #title { font-size: 1.35rem; letter-spacing: 2px; margin-bottom: 4px; }
    #score-row { gap: 8px; padding: 4px 0; }
    .score-box { font-size: 1.1rem; min-width: 64px; padding: 4px 12px; }
    #game-area { width: 96vw; aspect-ratio: 820 / 620; border-width: 4px; }
    #message { font-size: 1.35rem; white-space: normal; width: 90%; }
    #start-screen { gap: 12px; padding: 14px; }
    #start-screen h2 { font-size: 1.45rem; }
    #start-screen p { font-size: 0.88rem; line-height: 1.55; }
    #start-btn { font-size: 1.1rem; padding: 11px 28px; }
  }
</style>
</head>
<body>

<a id="home-link" href="index.html">🏠 Home</a>
<div id="title">🏓 COSMIC PONG 🚀</div>

<div id="score-row">
  <div class="score-box"><span class="score-label">YOU</span><span id="score-p">0</span></div>
  <div id="vs">VS</div>
  <div class="score-box"><span class="score-label">ALIEN</span><span id="score-cpu">0</span></div>
</div>

<div id="game-area">
  <canvas id="game-canvas" width="820" height="500"></canvas>
  <div id="message"></div>
  <div id="start-screen">
    <h2>🚀 BUILD YOUR ROCKET!</h2>
    <p>Move your <strong style="color:#FFD700">mouse up &amp; down</strong> to hit the ball back! 🎯<br>
    Score a point → <strong style="color:#72D7F5">add a rocket part!</strong><br>
    Score <strong style="color:#FFD700">10 points</strong> to blast off! 🏆<br>
    Every point earns you a ⭐ star for the arcade!</p>
    <button id="start-btn">▶ LET'S PLAY!</button>
  </div>
</div>

<script>
// ── SHARED ARCADE BANK ──
const ARCADE_KEY = 'masonArcade';
function arcadeLoad(){ try { return JSON.parse(localStorage.getItem(ARCADE_KEY)) || {}; } catch(e){ return {}; } }
function arcadeSave(b){ localStorage.setItem(ARCADE_KEY, JSON.stringify(b)); }
function arcadeEarn(n){ const b = arcadeLoad(); b.coins=(b.coins||0)+n; b.earned=(b.earned||0)+n; arcadeSave(b); }

// ── Canvas ──
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = 820, H = 500;

// Rocket-build panel sits bottom-right of the field
const HOX = W - 165, HOY = H - 240, HW = 155, HH = 230;
const PLAY_W = HOX - 10;

let gameRunning = false;
let mouseY = H / 2;
let playerScore = 0, cpuScore = 0, hits = 0;

const PLAYER_W = 22, PLAYER_H = 155;
const CPU_W = 15, CPU_H = 75;
const player = { x: 18, y: H/2 - PLAYER_H/2, w: PLAYER_W, h: PLAYER_H };
const cpu    = { x: PLAY_W - CPU_W - 8, y: H/2 - CPU_H/2, w: CPU_W, h: CPU_H };
const ball   = { x: PLAY_W/2, y: H/2, r: 12, vx: 3, vy: 2 };

// Paddle glow colours level up as you rally
const levelData = [
  { color:'#72D7F5' }, { color:'#34C759' }, { color:'#FFD700' }, { color:'#FF9500' }, { color:'#FF3B30' }
];
const HITS_PER_LEVEL = 5;
let level = 1;

// Twinkling starfield
const bgStars = [];
for (let i=0;i<70;i++) bgStars.push({ x:Math.random()*PLAY_W, y:Math.random()*H, r:Math.random()*1.5+0.3, t:Math.random()*Math.PI*2 });

let particles = [];
function spawnParticles(x, y, count, color){
  for (let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1, color, size:4+Math.random()*6 });
  }
}
function spawnConfetti(x, y){
  const cols=['#FFD700','#72D7F5','#34C759','#FF9500','#FF3B30','#AF52DE','#32ADE6'];
  for (let i=0;i<28;i++){
    const a=-Math.PI/2+(Math.random()-0.5)*Math.PI, s=4+Math.random()*8;
    particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1, color:cols[i%cols.length], size:7, isStar:Math.random()>0.5, rot:Math.random()*Math.PI, rotV:(Math.random()-0.5)*0.3 });
  }
}

function roundRect(c,x,y,w,h,r){ c.beginPath(); c.roundRect(x,y,w,h,r); }

// Glowing energy paddle
function drawPaddle(px, py, pw, ph, color){
  ctx.save();
  ctx.shadowColor = color; ctx.shadowBlur = 18;
  roundRect(ctx, px, py, pw, ph, pw/2); ctx.fillStyle = color; ctx.fill();
  ctx.restore();
  ctx.save(); roundRect(ctx, px, py, pw, ph, pw/2); ctx.clip();
  const g = ctx.createLinearGradient(px, py, px, py+ph*0.4);
  g.addColorStop(0,'rgba(255,255,255,0.55)'); g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(px, py, pw, ph*0.4);
  ctx.restore();
}

// Glowing comet ball
function drawBall(bx, by, br){
  const t = Date.now(); const hue = (t/18)%360;
  const glow = ctx.createRadialGradient(bx, by, 0, bx, by, br+16);
  glow.addColorStop(0, `hsla(${hue},100%,70%,0.55)`); glow.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(bx, by, br+16, 0, Math.PI*2); ctx.fillStyle = glow; ctx.fill();
  const grad = ctx.createRadialGradient(bx-br*0.3, by-br*0.3, br*0.05, bx, by, br);
  grad.addColorStop(0,'#fffbe0'); grad.addColorStop(0.6,`hsl(${hue},100%,65%)`); grad.addColorStop(1,`hsl(${hue},90%,45%)`);
  ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fillStyle = grad; ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx-br*0.32, by-br*0.3, br*0.28, br*0.18, -0.5, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.fill();
}

// Astronaut head (player) / alien head (cpu)
function drawAstronaut(cx, cy, scale){
  ctx.save(); ctx.translate(cx, cy); ctx.scale(scale, scale);
  ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.fillStyle='#f0f0f5'; ctx.fill();
  ctx.beginPath(); ctx.arc(0,2,12,0,Math.PI*2); ctx.fillStyle='#1b2a55'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(-4,-2,5,4,-0.5,0,Math.PI*2); ctx.fillStyle='rgba(140,210,255,0.8)'; ctx.fill();
  ctx.restore();
}
function drawAlien(cx, cy, scale){
  ctx.save(); ctx.translate(cx, cy); ctx.scale(scale, scale);
  ctx.beginPath(); ctx.ellipse(0,0,15,18,0,0,Math.PI*2); ctx.fillStyle='#34C759'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(-5,-2,4,6,0,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(5,-2,4,6,0,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
  ctx.beginPath(); ctx.arc(-5,-3,1.3,0,Math.PI*2); ctx.arc(5,-3,1.3,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.restore();
}

// ── ROCKET BUILD PANEL ──
let stage = 0;
function updateScoreLabels(){
  document.getElementById('score-p').textContent = playerScore;
  document.getElementById('score-cpu').textContent = cpuScore;
}

function setStartScreen(title, copy, buttonText){
  const screen = document.getElementById('start-screen');
  const titleEl = screen.querySelector('h2');
  const copyEl = screen.querySelector('p');
  const btn = document.getElementById('start-btn');
  titleEl.innerHTML = title;
  copyEl.innerHTML = copy;
  btn.textContent = buttonText;
  screen.style.display = 'flex';
}

function showReadyScreen(){
  setStartScreen(
    'ðŸš€ BUILD YOUR ROCKET!',
    'Drag your <strong style="color:#FFD700">finger up &amp; down</strong> to hit the ball back! ðŸŽ¯<br>' +
      'Mouse works too if you are on a computer.<br>' +
      'Score a point â†’ <strong style="color:#72D7F5">add a rocket part!</strong><br>' +
      'Score <strong style="color:#FFD700">10 points</strong> to blast off! ðŸ†<br>' +
      'Every point earns you a â­ star for the arcade!',
    "â–¶ LET'S PLAY!"
  );
}

function startGame(){
  playerScore = 0; cpuScore = 0; hits = 0; level = 1; stage = 0;
  particles = [];
  player.y = H/2 - PLAYER_H/2;
  cpu.y = H/2 - CPU_H/2;
  mouseY = H / 2;
  updateScoreLabels();
  document.getElementById('message').style.opacity = 0;
  document.getElementById('start-screen').style.display='none';
  gameRunning = true;
  resetBall(1);
}

function finishGame(){
  gameRunning = false;
  spawnConfetti(PLAY_W*0.7, H*0.4);
  setStartScreen(
    'ðŸ† ROCKET COMPLETE!',
    'You built the whole rocket and earned a <strong style="color:#FFD700">10 â­ bonus</strong>!<br>' +
      'Tap play again to build another rocket.',
    'â–¶ PLAY AGAIN'
  );
}

function renderRocketPanel(){
  const ox = HOX, oy = HOY;
  ctx.save(); ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=16;
  roundRect(ctx, ox-6, oy-28, HW+12, HH+34, 12); ctx.fillStyle='rgba(15,12,45,0.85)'; ctx.fill();
  ctx.restore();
  roundRect(ctx, ox-6, oy-28, HW+12, HH+34, 12); ctx.strokeStyle='rgba(255,215,0,0.55)'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#FFD700'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
  ctx.fillText('🚀 YOUR ROCKET', ox+HW/2, oy-10);

  // sky / launch pad backdrop
  ctx.save(); roundRect(ctx, ox, oy, HW, HH, 6); ctx.clip();
  const sky = ctx.createLinearGradient(0, oy, 0, oy+HH);
  sky.addColorStop(0,'#241a6e'); sky.addColorStop(1,'#0a0820');
  ctx.fillStyle = sky; ctx.fillRect(ox, oy, HW, HH);
  for (let i=0;i<22;i++){
    ctx.globalAlpha=0.5+0.4*Math.abs(Math.sin(Date.now()/600+i));
    ctx.beginPath(); ctx.arc(ox+((i*53)%HW), oy+((i*37)%(HH-40)), 0.8, 0, Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.translate(ox, oy);
  if (stage === 0){
    ctx.globalAlpha=0.12; drawRocketStage(10); ctx.globalAlpha=1;
    ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
    ctx.fillText('Score to build!', HW/2, HH-8);
  } else {
    drawRocketStage(stage);
    if (stage >= 10){
      const t=Date.now()/400;
      for (let i=0;i<8;i++){ const a=(i/8)*Math.PI*2+t;
        ctx.beginPath(); ctx.arc(HW/2+Math.cos(a)*52, HH*0.3+Math.sin(a)*30, 4, 0, Math.PI*2);
        ctx.fillStyle=`hsl(${(t*80+i*45)%360},100%,65%)`; ctx.fill(); }
      ctx.fillStyle='#FFD700'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
      ctx.fillText('🏆 LIFTOFF!', HW/2, HH-6);
    }
  }
  ctx.restore();
}

function rRect(x,y,w,h,r,color){
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fillStyle=color; ctx.fill();
  ctx.save(); ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.clip();
  const g=ctx.createLinearGradient(x,y,x,y+h*0.5);
  g.addColorStop(0,'rgba(255,255,255,0.3)'); g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g; ctx.fillRect(x,y,w,h); ctx.restore();
}

function drawRocketStage(s){
  const cx = HW/2, groundY = HH - 26;
  // local coords (0,0 = panel top-left)
  if (s >= 1){ // launch pad
    rRect(cx-46, groundY, 92, 10, 3, '#555a7a');
    rRect(cx-40, groundY-6, 12, 18, 2, '#3a3f5c');
    rRect(cx+28, groundY-6, 12, 18, 2, '#3a3f5c');
  }
  if (s >= 2) rRect(cx-20, groundY-58, 40, 60, 8, '#e8eef7');           // lower body
  if (s >= 3){ // left fin
    ctx.beginPath(); ctx.moveTo(cx-20, groundY-14); ctx.lineTo(cx-40, groundY+2); ctx.lineTo(cx-20, groundY-2); ctx.closePath();
    ctx.fillStyle='#FF3B30'; ctx.fill();
  }
  if (s >= 4){ // right fin
    ctx.beginPath(); ctx.moveTo(cx+20, groundY-14); ctx.lineTo(cx+40, groundY+2); ctx.lineTo(cx+20, groundY-2); ctx.closePath();
    ctx.fillStyle='#FF3B30'; ctx.fill();
  }
  if (s >= 5) rRect(cx-20, groundY-108, 40, 52, 8, '#cfd8ea');           // mid body
  if (s >= 6){ // window
    ctx.beginPath(); ctx.arc(cx, groundY-82, 12, 0, Math.PI*2); ctx.fillStyle='#1b2a55'; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, groundY-82, 12, 0, Math.PI*2); ctx.strokeStyle='#FFD700'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(cx-4, groundY-86, 4, 3, -0.5, 0, Math.PI*2); ctx.fillStyle='rgba(140,210,255,0.85)'; ctx.fill();
  }
  if (s >= 7) rRect(cx-15, groundY-150, 30, 44, 7, '#e8eef7');           // upper body
  if (s >= 8){ // nose cone
    ctx.beginPath(); ctx.moveTo(cx-15, groundY-150); ctx.lineTo(cx, groundY-186); ctx.lineTo(cx+15, groundY-150); ctx.closePath();
    ctx.fillStyle='#FF3B30'; ctx.fill();
  }
  if (s >= 9){ // booster flames
    const t = Date.now()/120;
    const fl = 16 + Math.sin(t)*5;
    const grad = ctx.createLinearGradient(cx, groundY-2, cx, groundY-2+fl);
    grad.addColorStop(0,'#fff3a0'); grad.addColorStop(0.5,'#FFD700'); grad.addColorStop(1,'rgba(216,90,48,0)');
    ctx.beginPath(); ctx.moveTo(cx-14, groundY-2); ctx.lineTo(cx, groundY-2+fl); ctx.lineTo(cx+14, groundY-2); ctx.closePath();
    ctx.fillStyle=grad; ctx.fill();
  }
  if (s >= 10){ // flag on top
    ctx.strokeStyle='#aaa'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx, groundY-186); ctx.lineTo(cx, groundY-208); ctx.stroke();
    rRect(cx+1, groundY-208, 20, 12, 2, '#FFD700');
    ctx.fillStyle='#cc0000'; ctx.font='bold 8px Arial'; ctx.textAlign='left';
    ctx.fillText('M', cx+6, groundY-199);
  }
}

// ── Ball / flow ──
function resetBall(dir=1){
  ball.x = PLAY_W/2; ball.y = H/2;
  const speed = Math.min(3 + level*0.12, 5);
  ball.vx = speed*dir; ball.vy = (Math.random()*2.5-1.25);
}
function showMessage(text, duration=1400){
  const msg=document.getElementById('message'); msg.textContent=text; msg.style.opacity=1;
  clearTimeout(showMessage._t); showMessage._t=setTimeout(()=>msg.style.opacity=0, duration);
}

function update(){
  if (!gameRunning) return;
  const target = mouseY - PLAYER_H/2;
  player.y += (target - player.y)*0.38;
  player.y = Math.max(0, Math.min(H-PLAYER_H, player.y));

  const cpuSpeed = Math.max(1.0, 2.2 - level*0.05);
  const cpuMid = cpu.y + CPU_H/2;
  if (cpuMid < ball.y-28) cpu.y += cpuSpeed; else if (cpuMid > ball.y+28) cpu.y -= cpuSpeed;
  cpu.y = Math.max(0, Math.min(H-CPU_H, cpu.y));

  ball.x += ball.vx; ball.y += ball.vy;
  if (ball.y-ball.r < 0){ ball.y=ball.r; ball.vy=Math.abs(ball.vy); }
  if (ball.y+ball.r > H){ ball.y=H-ball.r; ball.vy=-Math.abs(ball.vy); }

  const BUF = 20;
  if (ball.vx < 0 && ball.x-ball.r < player.x+player.w+BUF && ball.x+ball.r > player.x &&
      ball.y > player.y-BUF && ball.y < player.y+PLAYER_H+BUF){
    ball.vx = Math.min(Math.abs(ball.vx)*1.04, 7);
    ball.vy = ((ball.y-(player.y+PLAYER_H/2))/(PLAYER_H/2))*5;
    ball.x = player.x+player.w+ball.r+2;
    hits++; level = Math.min(levelData.length, Math.floor(hits/HITS_PER_LEVEL)+1);
    spawnParticles(ball.x, ball.y, 10, levelData[level-1].color); playHit();
  }
  if (ball.vx > 0 && ball.x+ball.r > cpu.x && ball.x-ball.r < cpu.x+cpu.w &&
      ball.y > cpu.y && ball.y < cpu.y+CPU_H){
    ball.vx = -Math.min(Math.abs(ball.vx)*1.01, 6);
    ball.vy = ((ball.y-(cpu.y+CPU_H/2))/(CPU_H/2))*4;
    ball.x = cpu.x-ball.r-1; playBounce();
  }

  if (ball.x < 0){
    cpuScore++; updateScoreLabels();
    showMessage('😅 Almost! Try again!'); playMiss(); resetBall(1);
  }
  if (ball.x > PLAY_W){
    playerScore++; updateScoreLabels();
    spawnConfetti(PLAY_W*0.7, H*0.4);
    stage = Math.min(playerScore, 10);
    arcadeEarn(1);                              // 1 star per point into the arcade bank
    showMessage('🚀 GREAT HIT! +1 PART!'); playScore();
    if (playerScore === 10){
      arcadeEarn(10);                           // liftoff bonus
      setTimeout(finishGame, 600);
      return;
      setTimeout(()=>showMessage('🏆 ROCKET COMPLETE! BLAST OFF! 🚀', 4000), 600);
    }
    resetBall(-1);
  }

  particles = particles.filter(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=0.022;
    if (p.rot!==undefined){ p.rot+=p.rotV; p.vx*=0.96; }
    return p.life>0;
  });
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // starfield in playfield
  bgStars.forEach(s=>{ s.t+=0.04;
    ctx.globalAlpha=0.3+0.4*Math.abs(Math.sin(s.t));
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  });
  ctx.globalAlpha=1;
  // centre line
  ctx.save(); ctx.setLineDash([14,10]); ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(PLAY_W/2,0); ctx.lineTo(PLAY_W/2,H); ctx.stroke(); ctx.restore();

  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life;
    if (p.isStar){ ctx.translate(p.x,p.y); ctx.rotate(p.rot||0); ctx.fillStyle=p.color; star(ctx,0,0,p.size*0.5,p.size,5); }
    else { ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  });

  const ld = levelData[level-1];
  drawPaddle(player.x, player.y, player.w, player.h, ld.color);
  drawPaddle(cpu.x, cpu.y, cpu.w, cpu.h, '#FF3B30');
  drawBall(ball.x, ball.y, ball.r);
  drawAstronaut(player.x+PLAYER_W/2, player.y-26, 1.1);
  drawAlien(cpu.x+CPU_W/2, cpu.y-22, 0.85);
  renderRocketPanel();
}

function star(c,cx,cy,inner,outer,points){
  c.beginPath();
  for (let i=0;i<points*2;i++){ const r=i%2===0?outer:inner; const a=(i/points)*Math.PI-Math.PI/2;
    i===0 ? c.moveTo(cx+r*Math.cos(a), cy+r*Math.sin(a)) : c.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a)); }
  c.closePath(); c.fill();
}

function gameLoop(){ update(); draw(); requestAnimationFrame(gameLoop); }

// ── Audio ──
let audioCtx;
function getAudio(){ return audioCtx || (audioCtx = new (window.AudioContext||window.webkitAudioContext)()); }
function playTone(freq, dur, type='square', vol=0.15){
  try{ const a=getAudio(), o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination); o.type=type; o.frequency.setValueAtTime(freq, a.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq*0.8, a.currentTime+dur);
    g.gain.setValueAtTime(vol, a.currentTime); g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+dur);
    o.start(); o.stop(a.currentTime+dur);
  }catch(e){}
}
function playHit(){ playTone(500,0.09,'sine',0.18); }
function playBounce(){ playTone(320,0.08,'sine',0.12); }
function playMiss(){ playTone(160,0.35,'sawtooth',0.15); }
function playScore(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.12,'sine',0.2), i*90)); }

// ── Input ──
const area = document.getElementById('game-area');
function setPaddleFromClientY(clientY){
  const rect = area.getBoundingClientRect();
  mouseY = (clientY - rect.top) * (H / rect.height);
}
area.addEventListener('mousemove', e => {
  setPaddleFromClientY(e.clientY);
});
area.addEventListener('touchstart', e => {
  if (e.target.closest('#start-screen')) return;
  e.preventDefault();
  setPaddleFromClientY(e.touches[0].clientY);
}, { passive:false });
area.addEventListener('touchmove', e => {
  if (e.target.closest('#start-screen')) return;
  e.preventDefault();
  setPaddleFromClientY(e.touches[0].clientY);
}, { passive:false });

document.getElementById('start-btn').addEventListener('click', startGame);

showReadyScreen();
gameLoop();
</script>
