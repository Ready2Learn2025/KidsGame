<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <script src="ios-app.js"></script>
  <title>Space Dash!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #05050f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #fff;
      user-select: none;
    }
    h1 { font-size: 28px; margin-bottom: 12px; letter-spacing: 2px; color: #FAC775; text-shadow: 0 0 18px #BA7517; }
    #canvas { border-radius: 14px; border: 2px solid #534AB7; display: block; box-shadow: 0 0 40px #1a1060; cursor: none; max-width: 96vw; height: auto; touch-action: none; }
    #hud { display: flex; gap: 1.5rem; margin-top: 12px; font-size: 17px; color: #aaa; flex-wrap: wrap; justify-content: center; }
    #hud span { font-weight: bold; color: #fff; }
    #coins-hud { color: #FAC775; }
    #hint { margin-top: 8px; font-size: 13px; color: #555; text-align: center; }
    #home-link {
      position: fixed; top: 16px; left: 16px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.4);
      color: #FAC775; text-decoration: none; font-size: 15px;
      padding: 8px 18px; border-radius: 30px; z-index: 50;
    }
    #home-link:hover { background: rgba(255,215,0,0.18); }
  </style>
</head>
<body>
  <a id="home-link" href="index.html">🏠 Home</a>
  <h1>🚀 Space Dash!</h1>
  <canvas id="canvas" width="480" height="580"></canvas>
  <div id="hud">
    ⭐ Score: <span id="score-val">0</span>
    &nbsp;|&nbsp; 🏆 Best: <span id="best-val">0</span>
    &nbsp;|&nbsp; ❤️ Lives: <span id="lives-val">❤️❤️❤️</span>
    &nbsp;|&nbsp; <span id="coins-hud">🪙 Coins: <span id="coins-val">0</span></span>
  </div>
  <div id="hint">← → arrow keys &nbsp;•&nbsp; mouse to steer &nbsp;•&nbsp; Space or click to start</div>

  <script>
    // ── SHARED ARCADE BANK ──
    const ARCADE_KEY = 'masonArcade';
    function arcadeLoad(){ try { return JSON.parse(localStorage.getItem(ARCADE_KEY)) || {}; } catch(e){ return {}; } }
    function arcadeSave(b){ localStorage.setItem(ARCADE_KEY, JSON.stringify(b)); }
    function arcadeEarn(n){ const b = arcadeLoad(); b.coins=(b.coins||0)+n; b.earned=(b.earned||0)+n; arcadeSave(b); }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl  = document.getElementById('score-val');
    const bestEl   = document.getElementById('best-val');
    const livesEl  = document.getElementById('lives-val');
    const coinsEl  = document.getElementById('coins-val');
    const W = canvas.width, H = canvas.height;

    const LANE_COUNT = 5;
    const LANE_W = W / LANE_COUNT;
    const SHIP_W = 44, SHIP_H = 56;

    const PLANET_DATA = [
      { color: '#D85A30', ring: '#F09595' },
      { color: '#378ADD', ring: '#B5D4F4' },
      { color: '#BA7517', ring: '#FAC775' },
      { color: '#3B6D11', ring: '#C0DD97' },
      { color: '#7F77DD', ring: '#CECBF6' },
      { color: '#D4537E', ring: '#F4C0D1' },
      { color: '#888780', ring: '#D3D1C7' },
    ];

    let ship, planets, coins, stars, score, totalCoins, lives, best, bestCoins;
    let speed, planetTimer, coinTimer, gameOver, started, flashTimer, shieldTimer;
    let mouseX = null;
    best = 0; bestCoins = 0;

    function initStars() {
      stars = [];
      for (let i = 0; i < 90; i++) {
        stars.push({
          x: Math.random() * W, y: Math.random() * H,
          r: Math.random() * 1.6 + 0.3,
          speed: Math.random() * 0.5 + 0.2,
          twinkle: Math.random() * Math.PI * 2
        });
      }
    }

    function reset() {
      ship = { lane: 2, x: LANE_W * 2 + LANE_W / 2, targetX: LANE_W * 2 + LANE_W / 2, y: H - 80 };
      planets = [];
      coins = [];
      score = 0;
      totalCoins = 0;
      lives = 3;
      speed = 1.8;           // much slower start
      planetTimer = 60;      // longer gap between planets
      coinTimer = 30;
      gameOver = false;
      flashTimer = 0;
      shieldTimer = 0;
      initStars();
      updateHUD();
    }

    function updateHUD() {
      scoreEl.textContent = score;
      livesEl.textContent = lives > 0 ? '❤️'.repeat(lives) : '💀';
      bestEl.textContent  = best;
      coinsEl.textContent = totalCoins;
    }

    function spawnPlanet() {
      // Never spawn two planets in the same lane back-to-back (easier for kids)
      const lastLane = planets.length ? planets[planets.length - 1].lane : -1;
      let lane;
      do { lane = Math.floor(Math.random() * LANE_COUNT); } while (lane === lastLane && LANE_COUNT > 1);

      const pd = PLANET_DATA[Math.floor(Math.random() * PLANET_DATA.length)];
      const r = 26 + Math.random() * 18;   // smaller planets
      planets.push({
        lane, x: lane * LANE_W + LANE_W / 2, y: -r - 10, r,
        color: pd.color, ringColor: pd.ring,
        hasRing: Math.random() > 0.5,
        rot: Math.random() * Math.PI * 2
      });
    }

    function spawnCoin() {
      const lane = Math.floor(Math.random() * LANE_COUNT);
      coins.push({ x: lane * LANE_W + LANE_W / 2, y: -20, r: 12, collected: false, pop: 0 });
    }

    function lighten(hex) {
      let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return `rgb(${Math.min(255,r+90)},${Math.min(255,g+90)},${Math.min(255,b+90)})`;
    }

    function drawBg() {
      ctx.fillStyle = '#060612';
      ctx.fillRect(0, 0, W, H);
      for (let i = 1; i < LANE_COUNT; i++) {
        ctx.strokeStyle = 'rgba(100,100,220,0.07)';
        ctx.lineWidth = 1;
        ctx.setLineDash([8, 18]);
        ctx.beginPath();
        ctx.moveTo(i * LANE_W, 0);
        ctx.lineTo(i * LANE_W, H);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    function drawStars(dt) {
      stars.forEach(s => {
        s.y += s.speed * speed * 0.5 * dt;
        s.twinkle += 0.05 * dt;
        if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
        const alpha = 0.35 + 0.4 * Math.abs(Math.sin(s.twinkle));
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    function drawPlanet(p) {
      ctx.save();
      ctx.translate(p.x, p.y);

      if (p.hasRing) {
        ctx.save();
        ctx.rotate(p.rot);
        ctx.scale(1, 0.3);
        ctx.beginPath();
        ctx.arc(0, 0, p.r * 1.75, 0, Math.PI * 2);
        ctx.strokeStyle = p.ringColor;
        ctx.lineWidth = 6;
        ctx.globalAlpha = 0.5;
        ctx.stroke();
        ctx.restore();
      }

      const grad = ctx.createRadialGradient(-p.r*0.3, -p.r*0.3, p.r*0.05, 0, 0, p.r);
      grad.addColorStop(0, lighten(p.color));
      grad.addColorStop(1, p.color);
      ctx.globalAlpha = 1;
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(-p.r*0.22, -p.r*0.26, p.r*0.2, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fill();

      ctx.restore();
    }

    function drawCoin(c) {
      if (c.collected && c.pop <= 0) return;
      ctx.save();
      ctx.translate(c.x, c.y);

      const scale = c.collected ? 1 + c.pop * 0.5 : 1;
      const alpha = c.collected ? c.pop : 1;
      ctx.globalAlpha = alpha;
      ctx.scale(scale, scale);

      const grad = ctx.createRadialGradient(-c.r*0.3, -c.r*0.35, 1, 0, 0, c.r);
      grad.addColorStop(0, '#fff7aa');
      grad.addColorStop(0.4, '#FAC775');
      grad.addColorStop(1, '#BA7517');
      ctx.beginPath();
      ctx.arc(0, 0, c.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.strokeStyle = '#EF9F27';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.fillStyle = '#BA7517';
      ctx.font = `bold ${Math.round(c.r * 1.1)}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('$', 0, 1);

      ctx.restore();
    }

    function drawShip(x, y) {
      ctx.save();
      ctx.translate(x, y);

      if (shieldTimer > 0) {
        ctx.save();
        ctx.globalAlpha = 0.28 + 0.18 * Math.sin(Date.now() / 70);
        ctx.beginPath();
        ctx.ellipse(0, 0, SHIP_W*0.9, SHIP_H*0.75, 0, 0, Math.PI*2);
        ctx.strokeStyle = '#7F77DD';
        ctx.lineWidth = 5;
        ctx.stroke();
        ctx.restore();
      }

      ctx.fillStyle = '#C0DD97';
      ctx.beginPath();
      ctx.moveTo(0, -SHIP_H/2);
      ctx.bezierCurveTo( SHIP_W*0.45, -SHIP_H*0.1,  SHIP_W*0.45, SHIP_H*0.3, 0, SHIP_H*0.5);
      ctx.bezierCurveTo(-SHIP_W*0.45,  SHIP_H*0.3, -SHIP_W*0.45, -SHIP_H*0.1, 0, -SHIP_H/2);
      ctx.fill();

      ctx.fillStyle = '#639922';
      ctx.beginPath();
      ctx.moveTo(-SHIP_W*0.45, SHIP_H*0.1);
      ctx.lineTo(-SHIP_W*0.72, SHIP_H*0.48);
      ctx.lineTo(-SHIP_W*0.2,  SHIP_H*0.32);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo( SHIP_W*0.45, SHIP_H*0.1);
      ctx.lineTo( SHIP_W*0.72, SHIP_H*0.48);
      ctx.lineTo( SHIP_W*0.2,  SHIP_H*0.32);
      ctx.closePath();
      ctx.fill();

      ctx.globalAlpha = 0.82;
      ctx.fillStyle = '#B5D4F4';
      ctx.beginPath();
      ctx.ellipse(0, -SHIP_H*0.08, SHIP_W*0.22, SHIP_H*0.22, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;

      const flameH = 22 + Math.random() * 10;
      const flame = ctx.createRadialGradient(0, SHIP_H*0.52, 1, 0, SHIP_H*0.52, flameH);
      flame.addColorStop(0, '#fff3a0');
      flame.addColorStop(0.4, '#FAC775');
      flame.addColorStop(0.8, '#D85A30');
      flame.addColorStop(1, 'transparent');
      ctx.fillStyle = flame;
      ctx.beginPath();
      ctx.ellipse(0, SHIP_H*0.52, 10, flameH, 0, 0, Math.PI*2);
      ctx.fill();

      ctx.restore();
    }

    function drawOverlay(line1, line2, line3) {
      ctx.save();
      ctx.fillStyle = 'rgba(6,6,18,0.82)';
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#FAC775';
      ctx.font = 'bold 38px Arial';
      ctx.fillText(line1, W/2, H/2 - 36);
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.font = '19px Arial';
      ctx.fillText(line2, W/2, H/2 + 10);
      if (line3) {
        ctx.fillStyle = 'rgba(250,199,117,0.7)';
        ctx.font = '16px Arial';
        ctx.fillText(line3, W/2, H/2 + 40);
      }
      ctx.restore();
    }

    function checkPlanetHit(p) {
      if (shieldTimer > 0) return false;
      const dx = ship.x - p.x, dy = ship.y - p.y;
      return Math.sqrt(dx*dx + dy*dy) < p.r + 14;
    }

    function checkCoinCollect(c) {
      const dx = ship.x - c.x, dy = ship.y - c.y;
      return Math.sqrt(dx*dx + dy*dy) < c.r + 18;
    }

    let last = 0;
    function loop(ts) {
      const dt = Math.min((ts - last) / 16.67, 3);
      last = ts;

      drawBg();
      drawStars(dt);

      if (!started) {
        drawShip(ship.x, ship.y);
        drawOverlay('🚀 Space Dash!', 'Click, tap, or press Space to launch!', 'Move mouse • Arrow keys • Swipe');
        requestAnimationFrame(loop);
        return;
      }

      if (gameOver) {
        planets.forEach(drawPlanet);
        coins.forEach(drawCoin);
        drawShip(ship.x, ship.y);
        drawOverlay('💥 Boom!', `Score: ${score}  •  Coins: ${totalCoins}`, 'Click or Space to play again!');
        requestAnimationFrame(loop);
        return;
      }

      // Mouse steering: snap targetX to mouse position smoothly
      if (mouseX !== null) {
        ship.targetX = Math.max(LANE_W * 0.3, Math.min(W - LANE_W * 0.3, mouseX));
      }
      ship.x += (ship.targetX - ship.x) * 0.14 * dt;

      // Spawn planets — generous gaps, much slower ramp
      planetTimer -= dt;
      if (planetTimer <= 0) {
        spawnPlanet();
        // Gap shrinks very slowly, stays long for ages
        planetTimer = Math.max(50, 70 - score * 0.08);
      }

      // Spawn coins frequently so kids stay engaged
      coinTimer -= dt;
      if (coinTimer <= 0) {
        spawnCoin();
        coinTimer = 22 + Math.random() * 18;
      }

      planets.forEach(p => { p.y += speed * dt; p.rot += 0.004 * dt; });
      planets = planets.filter(p => p.y < H + p.r + 20);

      coins.forEach(c => {
        if (!c.collected) c.y += speed * dt;
        else c.pop -= 0.07 * dt;
      });
      coins = coins.filter(c => c.y < H + 30 && (!c.collected || c.pop > 0));

      // Planet collision
      let hit = false;
      planets.forEach(p => { if (checkPlanetHit(p)) hit = true; });
      if (hit) {
        lives--;
        shieldTimer = 120;   // longer invincibility so kids can recover
        flashTimer  = 14;
        planets = planets.filter(p => {
          const dx = ship.x - p.x, dy = ship.y - p.y;
          return Math.sqrt(dx*dx + dy*dy) >= p.r + 14;
        });
        if (lives <= 0) {
          gameOver = true;
          if (score > best) best = score;
          if (totalCoins > bestCoins) bestCoins = totalCoins;
        }
        updateHUD();
      }

      // Coin collection
      coins.forEach(c => {
        if (!c.collected && checkCoinCollect(c)) {
          c.collected = true;
          c.pop = 1;
          totalCoins++;
          score += 10;      // bonus score per coin
          arcadeEarn(1);    // every coin = 1 star in the arcade bank
          updateHUD();
        }
      });

      if (shieldTimer > 0) shieldTimer -= dt;
      if (flashTimer  > 0) flashTimer  -= dt;

      // Score increments by whole numbers (1 per ~half second at start)
      score += speed * 0.025 * dt;
      scoreEl.textContent = Math.floor(score);

      // Very gentle speed increase — still feels fast enough to be fun
      speed = 1.8 + Math.floor(score) * 0.0015;

      if (flashTimer > 0 && Math.floor(flashTimer) % 2 === 0) {
        ctx.fillStyle = 'rgba(232,75,74,0.22)';
        ctx.fillRect(0, 0, W, H);
      }

      coins.forEach(drawCoin);
      planets.forEach(drawPlanet);
      drawShip(ship.x, ship.y);

      requestAnimationFrame(loop);
    }

    function moveLane(dir) {
      mouseX = null;   // release mouse control when using keys
      ship.lane = Math.max(0, Math.min(LANE_COUNT - 1, ship.lane + dir));
      ship.targetX = ship.lane * LANE_W + LANE_W / 2;
    }

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  { e.preventDefault(); if (started && !gameOver) moveLane(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); if (started && !gameOver) moveLane(1); }
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        if (!started)      started = true;
        else if (gameOver) { reset(); started = true; }
      }
    });

    // Mouse steer
    canvas.addEventListener('mousemove', e => {
      if (!started || gameOver) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      mouseX = (e.clientX - rect.left) * scaleX;
    });
    canvas.addEventListener('mouseleave', () => { mouseX = null; });

    // Click to start / restart
    canvas.addEventListener('click', e => {
      if (!started)      { started = true; return; }
      if (gameOver)      { reset(); started = true; }
    });

    // Touch
    let touchStartX = null;
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      touchStartX = e.touches[0].clientX;
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!started || gameOver) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      mouseX = (e.touches[0].clientX - rect.left) * scaleX;
    }, { passive: false });
    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      mouseX = null;
      if (!started)      { started = true; return; }
      if (gameOver)      { reset(); started = true; return; }
      if (touchStartX !== null) {
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 20) moveLane(dx > 0 ? 1 : -1);
        touchStartX = null;
      }
    }, { passive: false });

    reset();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
