<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="ios-app.js"></script>
<script src="avatar.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<title>Star Match!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif;
    background: #070718; color: #fff;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    overflow-x: hidden; user-select: none;
  }
  #space-bg {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
    background: radial-gradient(ellipse at 50% 20%, #1a1060 0%, #080820 65%, #030310 100%);
  }
  .star-bg { position: absolute; background: #fff; border-radius: 50%; animation: tw ease-in-out infinite alternate; }
  @keyframes tw { from { opacity: .2; transform: scale(.8);} to { opacity: 1; transform: scale(1.3);} }

  #home-link {
    position: fixed; top: 16px; left: 16px; z-index: 50;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.4);
    color: #FFD700; text-decoration: none; font-size: 15px; padding: 8px 18px; border-radius: 30px;
  }
  #home-link:hover { background: rgba(255,215,0,0.18); }

  .wrap { position: relative; z-index: 1; width: 100%; max-width: 640px; padding: 22px 16px 50px;
          display: flex; flex-direction: column; align-items: center; gap: 14px; }
  h1 { color: #FFD700; font-size: 2rem; letter-spacing: 2px; text-shadow: 0 0 26px rgba(255,200,0,0.5); text-align: center; }
  #hud { font-size: 1.2rem; color: #FFD700; display: flex; gap: 22px; }

  /* LEVEL PICK */
  #pick { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 360px; margin-top: 10px; }
  .pick-btn {
    font-family: inherit; font-size: 1.3rem; color: #fff; cursor: pointer;
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.25);
    border-radius: 20px; padding: 16px 20px; display: flex; align-items: center; gap: 14px;
    transition: transform .12s, background .12s;
  }
  .pick-btn:hover { transform: scale(1.03); background: rgba(255,255,255,0.18); }
  .pick-btn .pi { font-size: 2rem; }
  .pick-btn small { display: block; font-size: .85rem; color: rgba(255,255,255,0.6); }
  .pick-btn.easy { border-color: #30C840; }
  .pick-btn.med  { border-color: #FF9500; }
  .pick-btn.hard { border-color: #FF3B30; }

  /* BOARD */
  #board { display: grid; gap: 12px; perspective: 800px; }
  .card { width: 92px; height: 92px; cursor: pointer; }
  .card-inner { position: relative; width: 100%; height: 100%; transition: transform .4s; transform-style: preserve-3d; }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .face {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    border-radius: 16px; backface-visibility: hidden; -webkit-backface-visibility: hidden;
    font-size: 3rem; box-shadow: 0 4px 0 rgba(0,0,0,0.3);
  }
  .face-down {
    background: linear-gradient(160deg, #4a42b0, #2c2870);
    border: 2px solid #7F77DD; color: #FFD700; font-size: 2.2rem;
  }
  .face-up {
    background: rgba(255,255,255,0.95); transform: rotateY(180deg);
    border: 2px solid #FFD700;
  }
  .card.matched .card-inner { transform: rotateY(180deg); }
  .card.matched .face-up { background: #d6ffd9; border-color: #30C840; box-shadow: 0 0 18px rgba(48,200,64,0.6); }
  .card.matched { animation: pop .4s ease; }
  @keyframes pop { 0%{transform:scale(1);} 50%{transform:scale(1.12);} 100%{transform:scale(1);} }

  @media (max-width: 480px) { .card { width: 70px; height: 70px; } .face { font-size: 2.3rem; } .face-down { font-size: 1.8rem; } }

  #win {
    position: fixed; inset: 0; z-index: 100; display: none;
    align-items: center; justify-content: center; background: rgba(5,5,20,0.8);
  }
  #win.show { display: flex; }
  .win-box {
    background: #fff; color: #333; border-radius: 28px; padding: 36px 44px; text-align: center;
    animation: pop2 .5s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes pop2 { from { transform: scale(.5); opacity: 0;} to { transform: scale(1); opacity: 1;} }
  .win-emoji { font-size: 4.5rem; }
  .win-title { font-size: 2.2rem; color: #FF6B00; margin: 6px 0; }
  .win-sub { color: #888; font-size: 1.1rem; margin-bottom: 18px; }
  .win-box button {
    font-family: inherit; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 40px;
    padding: 12px 30px; margin: 5px; color: #fff; box-shadow: 0 5px 0 rgba(0,0,0,0.25);
  }
  .win-box button:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.25); }
  .btn-again { background: #FF8C00; }
  .btn-menu  { background: #7F77DD; }

  .star-fx { position: fixed; pointer-events: none; font-size: 2rem; z-index: 200; animation: fly 1.1s ease-out forwards; }
  @keyframes fly { 0%{transform:scale(0) rotate(0);opacity:1;} 100%{transform:scale(2) rotate(360deg) translateY(-80px);opacity:0;} }
</style>
</head>
<body>
<div id="space-bg"></div>
<a id="home-link" href="index.html">🏠 Home</a>

<div class="wrap">
  <h1>🌌 STAR MATCH 🌟</h1>
  <div id="hud">⭐ <span id="caught">0</span> &nbsp;|&nbsp; 🃏 Pairs: <span id="pairs">0</span></div>

  <div id="pick">
    <div class="pick-btn easy" onclick="startGame('easy')">
      <span class="pi">🌱</span><span>Easy<small>3 pairs — find them all!</small></span>
    </div>
    <div class="pick-btn med" onclick="startGame('med')">
      <span class="pi">🔥</span><span>Medium<small>6 pairs</small></span>
    </div>
    <div class="pick-btn hard" onclick="startGame('hard')">
      <span class="pi">💥</span><span>Hard<small>8 pairs</small></span>
    </div>
  </div>

  <div id="board" style="display:none;"></div>
</div>

<div id="win">
  <div class="win-box">
    <div class="win-emoji" id="win-emoji">🎉</div>
    <div class="win-title" id="win-title">You did it!</div>
    <div class="win-sub" id="win-sub"></div>
    <button class="btn-again" onclick="startGame(currentLevel)">▶ Play Again</button>
    <button class="btn-menu" onclick="toMenu()">🏠 Pick Level</button>
  </div>
</div>

<script>
// ── SHARED ARCADE BANK ──
const ARCADE_KEY='masonArcade';
function arcadeLoad(){ try{ return JSON.parse(localStorage.getItem(ARCADE_KEY))||{}; }catch(e){ return {}; } }
function arcadeSave(b){ localStorage.setItem(ARCADE_KEY, JSON.stringify(b)); }
function arcadeEarn(n){ const b=arcadeLoad(); b.coins=(b.coins||0)+n; b.earned=(b.earned||0)+n; arcadeSave(b); }

const SYMBOLS = ['🚀','🪐','🌟','👽','🛸','🌙','☄️','🌍','⭐','🌈'];
const LEVELS = { easy:3, med:6, hard:8 };
const COLS   = { easy:3, med:4, hard:4 };

const boardEl = document.getElementById('board');
const pickEl  = document.getElementById('pick');
const caughtEl= document.getElementById('caught');
const pairsEl = document.getElementById('pairs');

let currentLevel='easy', totalPairs=0, matched=0, sessionStars=0;
let first=null, busy=false;

function syncStars(){ caughtEl.textContent = sessionStars; }

function startGame(level){
  currentLevel=level; matched=0; first=null; busy=false;
  document.getElementById('win').classList.remove('show');
  pickEl.style.display='none'; boardEl.style.display='grid';
  totalPairs = LEVELS[level];
  pairsEl.textContent = '0/'+totalPairs;
  boardEl.style.gridTemplateColumns = `repeat(${COLS[level]}, auto)`;

  // build deck
  const chosen = shuffle(SYMBOLS.slice()).slice(0, totalPairs);
  const deck = shuffle([...chosen, ...chosen]);
  boardEl.innerHTML='';
  deck.forEach(sym=>{
    const card=document.createElement('div'); card.className='card'; card.dataset.sym=sym;
    card.innerHTML=`<div class="card-inner">
        <div class="face face-down">❓</div>
        <div class="face face-up">${sym}</div>
      </div>`;
    card.addEventListener('click', ()=>flip(card));
    boardEl.appendChild(card);
  });
}

function flip(card){
  if (busy || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  card.classList.add('flipped'); beep(560,0.07);
  if (!first){ first = card; return; }

  // second card
  if (card.dataset.sym === first.dataset.sym){
    const a=first, b=card; first=null;
    setTimeout(()=>{ a.classList.add('matched'); b.classList.add('matched'); }, 250);
    matched++; pairsEl.textContent = matched+'/'+totalPairs;
    sessionStars += 2; arcadeEarn(2); syncStars();
    burst(card); chime();
    if (matched === totalPairs){
      setTimeout(winRound, 700);
    }
  } else {
    busy=true; const a=first, b=card; first=null;
    setTimeout(()=>{ a.classList.remove('flipped'); b.classList.remove('flipped'); busy=false; }, 850);
  }
}

function winRound(){
  arcadeEarn(5); sessionStars += 5; syncStars();   // board-complete bonus
  document.getElementById('win-emoji').textContent = ['🎉','🏆','🌟','🚀'][Math.floor(Math.random()*4)];
  document.getElementById('win-sub').textContent = `You matched all ${totalPairs} pairs! +5 ⭐ bonus`;
  document.getElementById('win').classList.add('show');
}

function toMenu(){
  document.getElementById('win').classList.remove('show');
  boardEl.style.display='none'; pickEl.style.display='flex';
}

function shuffle(a){ for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function burst(near){
  const r=near.getBoundingClientRect();
  ['⭐','🌟','✨'].forEach((s,i)=>{
    const d=document.createElement('div'); d.className='star-fx'; d.textContent=s;
    d.style.left=(r.left+r.width/2+(Math.random()-0.5)*60)+'px';
    d.style.top=(r.top+r.height/2)+'px'; d.style.animationDelay=(i*0.08)+'s';
    document.body.appendChild(d); setTimeout(()=>d.remove(),1300);
  });
}

// sound
let actx;
function tone(f,d,type='sine',v=0.15){
  try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination); o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(v,actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);
    o.start(); o.stop(actx.currentTime+d);
  }catch(e){}
}
function beep(f,d){ tone(f,d,'sine',0.12); }
function chime(){ [523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,0.14,'sine',0.18), i*80)); }

// background stars
(function(){
  const bg=document.getElementById('space-bg');
  for (let i=0;i<110;i++){ const s=document.createElement('div'); s.className='star-bg';
    const sz=Math.random()*2.4+0.4;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*5}s;`;
    bg.appendChild(s); }
})();

if (window.ArcadeAvatar) {
  ArcadeAvatar.mountGuide({
    rootId: 'match-avatar-guide',
    gameId: 'star-match',
    title: 'Star Match Mission',
    primaryLabel: 'Start matching',
    messages: [
      'Pick a level, then flip two cards at a time.',
      'Match pairs with the same space picture.',
      'Finish the board to earn stars and a bonus.'
    ]
  });
}
</script>
</body>
</html>
