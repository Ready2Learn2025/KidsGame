<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="ios-app.js"></script>
<script src="avatar.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<title>Color Planets!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif;
    background: #070718; color: #fff; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none;
  }
  #space-bg {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
    background: radial-gradient(ellipse at 50% 20%, #1a1060 0%, #080820 65%, #030310 100%);
  }
  .star-bg { position: absolute; background: #fff; border-radius: 50%; animation: tw ease-in-out infinite alternate; }
  @keyframes tw { from { opacity: .2; transform: scale(.8);} to { opacity: 1; transform: scale(1.3);} }

  #home-link {
    position: fixed; top: 16px; left: 16px; z-index: 50;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.4);
    color: #FFD700; text-decoration: none; font-size: 15px; padding: 8px 18px; border-radius: 30px;
  }
  #home-link:hover { background: rgba(255,215,0,0.18); }

  .top { position: relative; z-index: 1; text-align: center; padding: 18px 10px 6px; }
  h1 { color: #FFD700; font-size: 1.7rem; letter-spacing: 1px; text-shadow: 0 0 22px rgba(255,200,0,0.5); }
  #hud { font-size: 1.15rem; color: #FFD700; margin-top: 4px; }

  #field {
    position: relative; z-index: 1; width: min(480px, 96vw); height: min(560px, 72vh);
    border-radius: 18px; border: 4px solid #534AB7;
    background: linear-gradient(160deg, #11103a 0%, #070718 100%);
    box-shadow: 0 0 40px rgba(120,100,255,0.3); overflow: hidden;
  }
  .planet {
    position: absolute; width: 62px; height: 62px; border-radius: 50%;
    box-shadow: inset -8px -8px 0 rgba(0,0,0,0.28), 0 4px 10px rgba(0,0,0,0.4);
    cursor: grab; touch-action: none;
  }
  .planet.held { cursor: grabbing; z-index: 30; box-shadow: inset -8px -8px 0 rgba(0,0,0,0.28), 0 0 20px rgba(255,255,255,0.8); transform: scale(1.12); }
  .planet.shake { animation: shake .4s ease; }
  @keyframes shake { 0%,100%{ margin-left:0;} 25%{ margin-left:-10px;} 75%{ margin-left:10px;} }
  .planet.gone { animation: gone .35s ease forwards; }
  @keyframes gone { to { transform: scale(0); opacity: 0; } }

  #bins { position: absolute; bottom: 0; left: 0; right: 0; height: 104px; display: flex; gap: 6px; padding: 6px; }
  .bin {
    flex: 1; border-radius: 14px 14px 10px 10px; position: relative; cursor: pointer;
    display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px;
    border: 4px solid; background: rgba(255,255,255,0.06);
    transition: transform .1s;
  }
  .bin::before {
    content: ''; position: absolute; top: 8px; left: 14%; right: 14%; height: 16px;
    border-radius: 50%; background: rgba(0,0,0,0.45);
  }
  .bin .swatch { width: 34px; height: 34px; border-radius: 50%; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.25); }
  .bin.hi { transform: translateY(-6px) scale(1.04); }

  .float-pt { position: absolute; z-index: 60; color: #FFD700; font-size: 1.4rem; pointer-events: none; animation: fp .8s ease-out forwards; }
  @keyframes fp { from { opacity: 1; transform: translateY(0);} to { opacity: 0; transform: translateY(-46px);} }

  #hint { position: relative; z-index: 1; margin-top: 10px; font-size: 13px; color: #888; text-align: center; }
</style>
</head>
<body>
<div id="space-bg"></div>
<a id="home-link" href="index.html">🏠 Home</a>

<div class="top">
  <h1>🪐 COLOR PLANETS 🌈</h1>
  <div id="hud">⭐ Sorted: <span id="sorted">0</span></div>
</div>

<div id="field">
  <div id="bins"></div>
</div>
<div id="hint">Drag each planet — or tap it then tap a port — into the matching color! 🎨</div>

<script>
// ── SHARED ARCADE BANK ──
const ARCADE_KEY='masonArcade';
function arcadeLoad(){ try{ return JSON.parse(localStorage.getItem(ARCADE_KEY))||{}; }catch(e){ return {}; } }
function arcadeSave(b){ localStorage.setItem(ARCADE_KEY, JSON.stringify(b)); }
function arcadeEarn(n){ const b=arcadeLoad(); b.coins=(b.coins||0)+n; b.earned=(b.earned||0)+n; arcadeSave(b); }

const PALETTE = [
  { id:'red',    c:'#FF3B30' },
  { id:'blue',   c:'#007AFF' },
  { id:'yellow', c:'#FFD700' },
  { id:'green',  c:'#34C759' },
];

const field   = document.getElementById('field');
const binsEl   = document.getElementById('bins');
const sortedEl = document.getElementById('sorted');

const SIZE = 62, FLOOR_OFFSET = 110; // keep planets above the bins
let planets = [], sorted = 0, selected = null;
let drag = null; // {planet, offX, offY, moved}

function lighten(hex, amt){
  const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,(n>>16)+amt), g=Math.min(255,(n>>8&255)+amt), b=Math.min(255,(n&255)+amt);
  return `rgb(${r},${g},${b})`;
}

// Build the colored ports (bins)
PALETTE.forEach(p=>{
  const bin=document.createElement('div');
  bin.className='bin'; bin.style.borderColor=p.c; bin.dataset.color=p.id;
  bin.innerHTML=`<div class="swatch" style="background:${p.c}"></div>`;
  bin.addEventListener('pointerup', ()=>{ if (selected) resolve(selected, p.id); });
  binsEl.appendChild(bin);
});

function fieldRect(){ return field.getBoundingClientRect(); }
function maxY(){ return field.clientHeight - FLOOR_OFFSET - SIZE; }

function spawn(){
  if (planets.length >= 6) return;
  const p = PALETTE[Math.floor(Math.random()*PALETTE.length)];
  const el = document.createElement('div');
  el.className='planet';
  el.style.background=`radial-gradient(circle at 35% 30%, ${lighten(p.c,80)}, ${p.c})`;
  const x = 8 + Math.random()*(field.clientWidth - SIZE - 16);
  const obj = { el, color:p.id, x, y:-SIZE, vy:0.5+Math.random()*0.35, held:false };
  el.style.left=x+'px'; el.style.top=obj.y+'px';
  el.addEventListener('pointerdown', e=>onGrab(e, obj));
  field.appendChild(el); planets.push(obj);
}

function onGrab(e, obj){
  e.preventDefault();
  const r = obj.el.getBoundingClientRect(), fr = fieldRect();
  drag = { planet:obj, offX:e.clientX-r.left, offY:e.clientY-r.top, moved:false };
  obj.held = true; obj.el.classList.add('held');
  try { obj.el.setPointerCapture(e.pointerId); } catch(_){}
}

field.addEventListener('pointermove', e=>{
  if (!drag) return;
  const fr = fieldRect();
  let nx = e.clientX - fr.left - drag.offX;
  let ny = e.clientY - fr.top  - drag.offY;
  nx = Math.max(0, Math.min(field.clientWidth - SIZE, nx));
  ny = Math.max(0, Math.min(field.clientHeight - SIZE, ny));
  drag.planet.x = nx; drag.planet.y = ny;
  drag.planet.el.style.left = nx+'px'; drag.planet.el.style.top = ny+'px';
  if (Math.abs(e.clientX) && (Math.abs(e.movementX)+Math.abs(e.movementY) > 2)) drag.moved = true;
  highlightBinUnder(e.clientX, e.clientY);
});

window.addEventListener('pointerup', e=>{
  clearBinHi();
  if (!drag) return;
  const obj = drag.planet;
  const binId = binUnder(e.clientX, e.clientY);
  if (drag.moved && binId){
    resolve(obj, binId);
    drag = null; deselect();
    return;
  }
  // treat as a tap → select this planet (keep it held & glowing)
  if (!drag.moved){
    if (selected && selected !== obj) selected.el.classList.remove('held'), selected.held=false;
    selected = obj; // stays held/glowing, paused
    drag = null;
    return;
  }
  // dragged but not onto a bin → drop & resume falling
  obj.held=false; obj.el.classList.remove('held'); drag=null; deselect();
});

function binUnder(cx, cy){
  for (const bin of binsEl.children){
    const r=bin.getBoundingClientRect();
    if (cx>=r.left && cx<=r.right && cy>=r.top && cy<=r.bottom) return bin.dataset.color;
  }
  return null;
}
function highlightBinUnder(cx, cy){
  clearBinHi();
  for (const bin of binsEl.children){
    const r=bin.getBoundingClientRect();
    if (cx>=r.left && cx<=r.right && cy>=r.top && cy<=r.bottom) bin.classList.add('hi');
  }
}
function clearBinHi(){ for (const bin of binsEl.children) bin.classList.remove('hi'); }
function deselect(){ if (selected){ selected.el.classList.remove('held'); selected.held=false; selected=null; } }

function resolve(obj, binId){
  if (obj.removed) return;
  if (obj.color === binId){
    obj.removed = true;
    sorted++; sortedEl.textContent = sorted; arcadeEarn(1);
    floatStar(obj);
    obj.el.classList.add('gone');
    chime();
    setTimeout(()=>{ obj.el.remove(); planets=planets.filter(p=>p!==obj); }, 350);
    if (selected===obj) selected=null;
  } else {
    obj.el.classList.add('shake'); buzz();
    setTimeout(()=>obj.el.classList.remove('shake'), 400);
    // wrong port: release so they can try again
    obj.held=false; obj.el.classList.remove('held'); if (selected===obj) selected=null;
  }
}

function floatStar(obj){
  const f=document.createElement('div'); f.className='float-pt'; f.textContent='+1⭐';
  f.style.left=(obj.x+10)+'px'; f.style.top=(obj.y)+'px';
  field.appendChild(f); setTimeout(()=>f.remove(), 800);
}

// fall loop
function loop(){
  const my = maxY();
  planets.forEach(o=>{
    if (o.held || o.removed) return;
    o.y += o.vy;
    if (o.y > my) o.y = my;           // rest just above the ports
    o.el.style.top = o.y+'px';
  });
  requestAnimationFrame(loop);
}

let spawnTimer = setInterval(spawn, 1500);
spawn(); spawn();
loop();

if (window.ArcadeAvatar) {
  ArcadeAvatar.mountGuide({
    rootId: 'color-avatar-guide',
    gameId: 'color-planets',
    title: 'Color Planets Mission',
    primaryLabel: 'Start sorting',
    messages: [
      'Drag a planet to the matching color port.',
      'You can also tap a planet, then tap the right port.',
      'Each correct color match earns 1 star.'
    ]
  });
}

// sounds
let actx;
function tone(f,d,type='sine',v=0.15){
  try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination); o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(v,actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);
    o.start(); o.stop(actx.currentTime+d);
  }catch(e){}
}
function chime(){ [523,784].forEach((f,i)=>setTimeout(()=>tone(f,0.13,'sine',0.18), i*70)); }
function buzz(){ tone(150,0.18,'sawtooth',0.12); }

// background stars
(function(){
  const bg=document.getElementById('space-bg');
  for (let i=0;i<100;i++){ const s=document.createElement('div'); s.className='star-bg';
    const sz=Math.random()*2.4+0.4;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*5}s;`;
    bg.appendChild(s); }
})();
</script>
</body>
</html>
