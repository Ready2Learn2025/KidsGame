<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="ios-app.js"></script>
<script src="arcade-core.js"></script>
<script src="avatar.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<title>Land Jump!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px 14px 28px;
    background: radial-gradient(ellipse at 50% 12%, #1a1060 0%, #080820 62%, #030310 100%);
    color: #fff;
    font-family: 'Fredoka One', 'Arial Rounded MT Bold', 'Arial Black', Arial, sans-serif;
    overflow-x: hidden;
    user-select: none;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 14% 24%, rgba(255,215,0,0.15), transparent 16%),
      radial-gradient(circle at 86% 15%, rgba(50,173,230,0.13), transparent 14%),
      radial-gradient(circle at 82% 84%, rgba(175,82,222,0.2), transparent 18%);
    opacity: 0.85;
  }
  #home-link {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 50;
    padding: 9px 18px;
    border: 1px solid rgba(255,215,0,0.42);
    border-radius: 30px;
    background: rgba(255,255,255,0.1);
    color: #FFD700;
    font-size: 15px;
    text-decoration: none;
  }
  #home-link:hover { background: rgba(255,215,0,0.18); }
  .shell {
    position: relative;
    z-index: 1;
    width: min(540px, 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  h1 {
    font-size: clamp(2rem, 8vw, 3rem);
    color: #FFD700;
    line-height: 1;
    text-align: center;
    text-shadow: 0 0 26px rgba(255,200,0,0.48), 4px 4px 0 rgba(0,0,0,0.36);
  }
  .hud {
    width: min(500px, 96vw);
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 7px;
  }
  .hud-card {
    min-height: 56px;
    padding: 8px 5px 7px;
    border: 2px solid rgba(255,215,0,0.42);
    border-radius: 16px;
    background: rgba(12,18,70,0.84);
    box-shadow: inset 0 0 18px rgba(80,120,255,0.18), 0 8px 20px rgba(0,0,0,0.24);
    text-align: center;
  }
  .hud-card small {
    display: block;
    margin-bottom: 2px;
    color: rgba(255,255,255,0.76);
    font-size: 0.66rem;
    line-height: 1.05;
  }
  .hud-card strong {
    display: block;
    color: #FFD700;
    font-size: clamp(0.94rem, 3.3vw, 1.26rem);
    line-height: 1.1;
    text-shadow: 0 0 12px rgba(255,200,0,0.35);
  }
  .board {
    width: min(500px, 96vw);
    padding: 8px;
    border: 3px solid #FFD700;
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(255,215,0,0.16), rgba(44,39,148,0.1));
    box-shadow: 0 0 34px rgba(255,200,0,0.22), 0 16px 42px rgba(0,0,0,0.4);
  }
  #canvas {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 16px;
    background: #050514;
    cursor: pointer;
    touch-action: none;
  }
  .modes {
    width: min(500px, 96vw);
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 9px;
    margin-top: 3px;
  }
  .mode-btn {
    min-height: 54px;
    border: 2px solid rgba(255,255,255,0.22);
    border-radius: 18px;
    color: #fff;
    font-family: inherit;
    font-size: clamp(0.92rem, 4vw, 1.2rem);
    text-shadow: 0 2px 0 rgba(0,0,0,0.28);
    box-shadow: 0 6px 0 rgba(0,0,0,0.3), 0 10px 24px rgba(0,0,0,0.24);
    cursor: pointer;
  }
  .mode-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.3), 0 8px 18px rgba(0,0,0,0.22);
  }
  .mode-btn.easy { background: linear-gradient(#55db44, #138f20); }
  .mode-btn.hard { background: linear-gradient(#ffb22c, #e05d00); }
  .mode-btn.harder { background: linear-gradient(#ba68ff, #6731c5); }
  .mode-btn.active {
    border-color: #FFD700;
    box-shadow: 0 6px 0 rgba(116,70,0,0.68), 0 0 28px rgba(255,215,0,0.34);
  }
  #status {
    width: min(500px, 96vw);
    min-height: 30px;
    padding: 7px 12px;
    border: 1px solid rgba(255,215,0,0.28);
    border-radius: 999px;
    background: rgba(0,0,0,0.22);
    color: rgba(255,255,255,0.78);
    font-size: 0.9rem;
    line-height: 1.2;
    text-align: center;
  }
  @media (max-width: 520px) {
    body { padding: 18px 8px 20px; }
    .hud { gap: 5px; }
    .hud-card { min-height: 50px; padding: 7px 3px 6px; border-radius: 13px; }
    .hud-card small { font-size: 0.58rem; }
    .modes { gap: 6px; }
    .mode-btn { min-height: 48px; border-radius: 15px; }
    #status { font-size: 0.78rem; }
  }
  @media (min-width: 700px) and (max-height: 760px) {
    body { padding-bottom: 14px; }
    .shell { gap: 7px; }
    h1 { font-size: 2.12rem; }
    .hud,
    .board,
    .modes { width: min(350px, 88vw); }
    .hud { gap: 5px; }
    .hud-card { min-height: 48px; padding: 6px 3px 5px; border-radius: 13px; }
    .hud-card small { font-size: 0.54rem; }
    .hud-card strong { font-size: 0.9rem; }
    .board { padding: 6px; border-radius: 18px; }
    #canvas { border-radius: 12px; }
    .mode-btn { min-height: 44px; border-radius: 14px; font-size: 0.92rem; }
    #status { display: none; }
  }
</style>
</head>
<body>
<a id="home-link" href="index.html">🏠 Home</a>

<main class="shell" aria-label="Land Jump game">
  <h1>🪨 Land Jump 🚀</h1>
  <div class="hud" aria-live="polite">
    <div class="hud-card"><small>Mode</small><strong id="mode-val">Easy</strong></div>
    <div class="hud-card"><small>Score</small><strong id="score-val">0</strong></div>
    <div class="hud-card"><small>Coins <span id="mult-val">x1</span></small><strong id="coins-val">0</strong></div>
    <div class="hud-card"><small>Best</small><strong id="best-val">0</strong></div>
  </div>
  <div class="board">
    <canvas id="canvas" width="500" height="650"></canvas>
  </div>
  <div class="modes" role="group" aria-label="Land Jump difficulty">
    <button class="mode-btn easy active" type="button" data-mode="easy">⭐ Easy</button>
    <button class="mode-btn hard" type="button" data-mode="hard">🚀 Hard</button>
    <button class="mode-btn harder" type="button" data-mode="harder">🪐 Harder</button>
  </div>
  <div id="status">Tap, click, or press Space to jump.</div>
</main>

<div id="land-avatar-guide"></div>

<script>
// ── SHARED ARCADE BANK ──
const ARCADE_KEY = 'masonArcade';
function arcadeLoad(){ if (window.ArcadeCore) return ArcadeCore.load(); try { return JSON.parse(localStorage.getItem(ARCADE_KEY)) || {}; } catch(e){ return {}; } }
function arcadeSave(b){ if (window.ArcadeCore) return ArcadeCore.save(b); localStorage.setItem(ARCADE_KEY, JSON.stringify(b)); }
function arcadeEarn(n){
  if (window.ArcadeCore) return ArcadeCore.earnStars(n);
  const amount = Math.max(0, Math.floor(n || 0));
  if (!amount) return;
  const b = arcadeLoad();
  b.coins = (b.coins || 0) + amount;
  b.earned = (b.earned || 0) + amount;
  arcadeSave(b);
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;
const GROUND_Y = 510;
const modeEl = document.getElementById('mode-val');
const scoreEl = document.getElementById('score-val');
const coinsEl = document.getElementById('coins-val');
const multEl = document.getElementById('mult-val');
const bestEl = document.getElementById('best-val');
const statusEl = document.getElementById('status');
const modeButtons = Array.from(document.querySelectorAll('.mode-btn'));

const MODES = {
  easy:   { label:'Easy',   gravity:0.46, jump:-11.2, speed:2.05, meteorEvery:132, meteorSize:32, coinEvery:86,  scoreRate:0.045, firstMeteor:108, hitScale:0.72 },
  hard:   { label:'Hard',   gravity:0.52, jump:-11.9, speed:2.8,  meteorEvery:98,  meteorSize:36, coinEvery:74,  scoreRate:0.062, firstMeteor:74,  hitScale:0.84 },
  harder: { label:'Harder', gravity:0.58, jump:-12.5, speed:3.35, meteorEvery:78,  meteorSize:39, coinEvery:63,  scoreRate:0.078, firstMeteor:58,  hitScale:0.88 }
};

const SPRITES = {
  run:[0,0], jump:[1,0], meteor:[2,0],
  smallMeteor:[0,1], coin:[1,1], boost:[2,1],
  ground:[0,2], planet:[1,2], rock:[2,2]
};
const spriteSheet = new Image();
let spritesReady = false;
spriteSheet.onload = () => { spritesReady = true; };
spriteSheet.src = 'assets/land-jump-sprites.png';

const player = { x: 112, y: GROUND_Y, vy: 0, w: 70, h: 82, onGround: true, bob: 0, maxJumps: 3, jumpsLeft: 3 };
let activeMode = 'easy';
let cfg = MODES[activeMode];
let state = 'ready';
let score = 0;
let coinsRun = 0;
let boostTimer = 0;
let meteors = [];
let pickups = [];
let bursts = [];
let stars = [];
let frame = 0;
let meteorTimer = 0;
let coinTimer = 0;
let flashTimer = 0;
let best = getBest(activeMode);
let lastTime = 0;
let groundOffset = 0;
let runCompleted = false;

function initStars(){
  stars = Array.from({length: 110}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.5 + 0.35,
    d: Math.random() * 0.7 + 0.24,
    tw: Math.random() * Math.PI * 2
  }));
}

function getBest(modeKey){
  const b = arcadeLoad();
  const bests = b.bestLandJump || {};
  return bests[modeKey] || 0;
}

function saveBest(value){
  const b = arcadeLoad();
  const bests = {...(b.bestLandJump || {})};
  if (value > (bests[activeMode] || 0)) {
    bests[activeMode] = value;
    b.bestLandJump = bests;
    b.bestLandJumpOverall = Math.max(value, b.bestLandJumpOverall || 0);
    arcadeSave(b);
  }
}

function reset(){
  cfg = MODES[activeMode];
  player.y = GROUND_Y;
  player.vy = 0;
  player.onGround = true;
  player.bob = 0;
  player.jumpsLeft = player.maxJumps;
  state = 'ready';
  score = 0;
  coinsRun = 0;
  boostTimer = 0;
  meteors = [];
  pickups = [];
  bursts = [];
  frame = 0;
  meteorTimer = cfg.firstMeteor;
  coinTimer = 42;
  flashTimer = 0;
  runCompleted = false;
  best = getBest(activeMode);
  updateHUD();
  statusEl.textContent = `${cfg.label} mode ready. Triple jump over meteors and collect coins.`;
}

function updateHUD(){
  const scoreInt = Math.floor(score);
  modeEl.textContent = cfg.label;
  scoreEl.textContent = scoreInt;
  coinsEl.textContent = coinsRun;
  multEl.textContent = `x${coinMultiplier()}`;
  bestEl.textContent = Math.max(best, scoreInt);
  if (state === 'playing') {
    const jumpText = player.onGround ? 'Triple jump ready.' : `${player.jumpsLeft} air jump${player.jumpsLeft === 1 ? '' : 's'} left.`;
    statusEl.textContent = boostTimer > 0
      ? `Coin boost active: x${coinMultiplier()} coins. ${jumpText}`
      : `Jump over meteors. Coins are x${baseMultiplier()} now. ${jumpText}`;
  }
}

function baseMultiplier(){
  return Math.min(5, 1 + Math.floor(score / 42));
}

function coinMultiplier(){
  return baseMultiplier() * (boostTimer > 0 ? 2 : 1);
}

function setMode(modeKey){
  if (!MODES[modeKey]) return;
  activeMode = modeKey;
  modeButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === modeKey));
  reset();
}

function jump(){
  if (window.ArcadeCore && ArcadeCore.isPaused()) return;
  if (state === 'over') reset();
  if (state === 'ready') {
    state = 'playing';
    meteorTimer = cfg.firstMeteor;
  }
  if (player.jumpsLeft <= 0) return;
  const jumpNumber = player.maxJumps - player.jumpsLeft + 1;
  const jumpPower = jumpNumber === 1 ? cfg.jump : cfg.jump * (jumpNumber === 2 ? 0.88 : 0.78);
  player.vy = jumpPower;
  player.onGround = false;
  player.jumpsLeft--;
  const label = jumpNumber === 1 ? 'jump' : jumpNumber === 2 ? 'double' : 'triple';
  burst(player.x - 18, player.y - 22, label, '#72D7F5');
  tone(540 + jumpNumber * 70, 0.055, 'sine', 0.08);
}

function spawnMeteor(){
  const big = activeMode !== 'easy' && Math.random() < 0.72;
  meteors.push({
    x: W + 76,
    y: GROUND_Y - (big ? 34 : 25),
    r: big ? cfg.meteorSize : Math.max(24, cfg.meteorSize - 9),
    speed: cfg.speed * (1 + Math.random() * 0.14),
    small: !big,
    rot: -0.24
  });
}

function spawnPickup(){
  const jumpLane = Math.random() < 0.62;
  pickups.push({
    type: Math.random() < 0.14 ? 'boost' : 'coin',
    x: W + 60,
    y: jumpLane ? GROUND_Y - 118 - Math.random() * 32 : GROUND_Y - 58,
    r: jumpLane ? 17 : 15,
    spin: Math.random() * Math.PI * 2
  });
}

function update(dt){
  if (state !== 'playing') {
    bursts.forEach(b => { b.life -= 0.035 * dt; b.y -= 0.8 * dt; });
    bursts = bursts.filter(b => b.life > 0);
    return;
  }

  frame += dt;
  groundOffset = (groundOffset + cfg.speed * dt) % 170;
  score += cfg.scoreRate * dt;
  player.bob += 0.18 * dt;
  if (boostTimer > 0) boostTimer = Math.max(0, boostTimer - dt);
  if (flashTimer > 0) flashTimer = Math.max(0, flashTimer - dt);

  player.vy += cfg.gravity * dt;
  player.y += player.vy * dt;
  if (player.y >= GROUND_Y) {
    if (!player.onGround && player.vy > 0) burst(player.x - 18, GROUND_Y - 12, 'tap', '#C9C3B4', 0.75);
    player.y = GROUND_Y;
    player.vy = 0;
    player.onGround = true;
    player.jumpsLeft = player.maxJumps;
  }

  meteorTimer -= dt;
  if (meteorTimer <= 0) {
    spawnMeteor();
    const wobble = activeMode === 'easy' ? 36 : 22;
    meteorTimer = cfg.meteorEvery + Math.random() * wobble;
  }

  coinTimer -= dt;
  if (coinTimer <= 0) {
    spawnPickup();
    coinTimer = cfg.coinEvery + Math.random() * 28;
  }

  meteors.forEach(m => {
    m.x -= m.speed * dt;
    if (hitCircle(player.x + 6, player.y - 42, 28 * cfg.hitScale, m.x, m.y, m.r)) endRun();
  });
  meteors = meteors.filter(m => m.x > -90);

  pickups.forEach(p => {
    p.x -= cfg.speed * dt;
    p.spin += 0.05 * dt;
    if (hitCircle(player.x + 2, player.y - 44, 31, p.x, p.y, p.r)) collectPickup(p);
  });
  pickups = pickups.filter(p => !p.dead && p.x > -70);

  bursts.forEach(b => { b.life -= 0.04 * dt; b.y -= 0.9 * dt; });
  bursts = bursts.filter(b => b.life > 0);
  updateHUD();
}

function collectPickup(p){
  p.dead = true;
  if (p.type === 'boost') {
    const bonus = 4 * baseMultiplier();
    boostTimer = Math.max(boostTimer, 520);
    coinsRun += bonus;
    arcadeEarn(bonus);
    burst(p.x, p.y, `x2 +${bonus}`, '#72D7F5');
    chime();
    return;
  }
  const value = coinMultiplier();
  coinsRun += value;
  arcadeEarn(value);
  burst(p.x, p.y, `+${value}`, '#FFD700');
  tone(880, 0.06, 'sine', 0.08);
}

function endRun(){
  if (state !== 'playing') return;
  state = 'over';
  flashTimer = 16;
  const scoreInt = Math.floor(score);
  if (scoreInt > best) {
    best = scoreInt;
    saveBest(scoreInt);
  }
  statusEl.textContent = `Meteor bump! Score ${scoreInt}, coins ${coinsRun}. Tap to try again.`;
  if (!runCompleted && window.ArcadeCore) ArcadeCore.completeGame('land-jump', { mode:activeMode, score:scoreInt, coins:coinsRun });
  runCompleted = true;
  tone(190, 0.16, 'sawtooth', 0.05);
  updateHUD();
}

function hitCircle(x1,y1,r1,x2,y2,r2){
  return Math.hypot(x1 - x2, y1 - y2) < r1 + r2;
}

function burst(x, y, text, color, scale = 1){
  bursts.push({ x, y, text, color, life: 1, scale });
}

function draw(){
  drawBackground();
  pickups.forEach(drawPickup);
  meteors.forEach(drawMeteor);
  drawPlayer();
  drawBursts();
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,60,80,${0.16 * (flashTimer / 16)})`;
    ctx.fillRect(0, 0, W, H);
  }
  if (state === 'ready') drawOverlay('Land Jump', `${cfg.label} mode`, 'Tap up to 3 times');
  if (state === 'over') drawOverlay('Nice jumping!', `Score ${Math.floor(score)}  ·  Coins ${coinsRun}`, 'Tap to play again');
}

function drawBackground(){
  const grad = ctx.createRadialGradient(W * 0.5, H * 0.16, 10, W * 0.5, H * 0.5, H * 0.74);
  grad.addColorStop(0, '#181069');
  grad.addColorStop(0.62, '#070720');
  grad.addColorStop(1, '#030310');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  stars.forEach(s => {
    s.x -= cfg.speed * s.d * 0.14;
    s.tw += 0.035;
    if (s.x < -3) { s.x = W + 3; s.y = Math.random() * H; }
    ctx.save();
    ctx.globalAlpha = 0.34 + 0.46 * Math.abs(Math.sin(s.tw));
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  drawSprite('planet', W - 86, 104, 120, 98, -0.08, 0.72);
  drawSprite('rock', W - 58 - (groundOffset * 0.55), GROUND_Y + 30, 92, 72, 0, 0.66);
  drawGround();
}

function drawGround(){
  ctx.save();
  ctx.fillStyle = '#b7aea3';
  ctx.fillRect(0, GROUND_Y + 8, W, 58);
  ctx.fillStyle = '#524a62';
  ctx.fillRect(0, GROUND_Y + 58, W, H - GROUND_Y);
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(0, GROUND_Y + 8, W, 5);
  ctx.fillStyle = '#2a2550';
  ctx.fillRect(0, GROUND_Y + 36, W, H - GROUND_Y);
  for (let x = -170 + groundOffset; x < W + 210; x += 118) {
    drawSprite('ground', x, GROUND_Y + 44, 240, 128, 0, 1);
  }
  ctx.restore();
}

function drawPickup(p){
  if (p.type === 'boost') drawSprite('boost', p.x, p.y, 56, 56, Math.sin(p.spin) * 0.1, 1);
  else drawSprite('coin', p.x, p.y, 44, 44, Math.sin(p.spin) * 0.12, 1);
}

function drawMeteor(m){
  drawSprite(m.small ? 'smallMeteor' : 'meteor', m.x, m.y, m.small ? 104 : 138, m.small ? 62 : 86, m.rot, 1);
}

function drawPlayer(){
  const sprite = player.onGround ? 'run' : 'jump';
  const bob = player.onGround ? Math.sin(player.bob) * 2.5 : 0;
  drawSprite(sprite, player.x, player.y - 50 + bob, 150, 150, player.onGround ? 0 : -0.08, 1);
  if (boostTimer > 0) {
    ctx.save();
    ctx.globalAlpha = 0.46 + 0.2 * Math.sin(frame * 0.26);
    ctx.strokeStyle = '#72D7F5';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(player.x + 2, player.y - 44, 39, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

function drawBursts(){
  bursts.forEach(b => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, b.life);
    ctx.textAlign = 'center';
    ctx.font = `${Math.floor(24 * b.scale)}px 'Fredoka One', Arial`;
    ctx.lineWidth = 5;
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.strokeText(b.text, b.x, b.y);
    ctx.fillStyle = b.color;
    ctx.fillText(b.text, b.x, b.y);
    ctx.restore();
  });
}

function drawOverlay(title, line, action){
  ctx.save();
  ctx.fillStyle = 'rgba(4,4,20,0.72)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(12,18,70,0.9)';
  roundRect(55, H / 2 - 102, W - 110, 204, 24);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,215,0,0.72)';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD700';
  ctx.font = "42px 'Fredoka One', Arial";
  ctx.lineWidth = 6;
  ctx.strokeStyle = 'rgba(0,0,0,0.42)';
  ctx.strokeText(title, W / 2, H / 2 - 38);
  ctx.fillText(title, W / 2, H / 2 - 38);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = "21px 'Fredoka One', Arial";
  ctx.fillText(line, W / 2, H / 2 + 6);
  ctx.fillStyle = '#72D7F5';
  ctx.font = "17px 'Fredoka One', Arial";
  ctx.fillText(action, W / 2, H / 2 + 45);
  ctx.restore();
}

function drawSprite(name, cx, cy, dw, dh, angle = 0, alpha = 1){
  if (!spritesReady || !SPRITES[name]) {
    drawFallback(name, cx, cy, dw, dh, angle, alpha);
    return;
  }
  const [col, row] = SPRITES[name];
  const sw = spriteSheet.naturalWidth / 3;
  const sh = spriteSheet.naturalHeight / 3;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.globalAlpha *= alpha;
  ctx.drawImage(spriteSheet, col * sw, row * sh, sw, sh, -dw / 2, -dh / 2, dw, dh);
  ctx.restore();
}

function drawFallback(name, cx, cy, dw, dh, angle, alpha){
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.globalAlpha *= alpha;
  if (name === 'coin' || name === 'boost') {
    ctx.fillStyle = name === 'boost' ? '#32ADE6' : '#FFD700';
    ctx.beginPath();
    ctx.arc(0, 0, Math.min(dw, dh) / 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `${Math.floor(dw / 3)}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(name === 'boost' ? 'x2' : '★', 0, 1);
  } else if (name === 'run' || name === 'jump') {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, -8, dw * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#72D7F5';
    ctx.beginPath();
    ctx.arc(6, -12, dw * 0.16, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillStyle = name.includes('Meteor') || name === 'meteor' ? '#FF9500' : '#8a8177';
    roundRect(-dw / 2, -dh / 2, dw, dh, 16);
    ctx.fill();
  }
  ctx.restore();
}

function roundRect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

let actx;
function tone(freq, dur, type = 'sine', volume = 0.12){
  if (window.ArcadeCore && ArcadeCore.isMuted()) return;
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    osc.start();
    osc.stop(actx.currentTime + dur);
  } catch(e) {}
}
function chime(){
  [660, 880, 1100].forEach((f, i) => setTimeout(() => tone(f, 0.08, 'sine', 0.09), i * 70));
}

function loop(now){
  if (window.ArcadeCore && ArcadeCore.isPaused()) {
    lastTime = now;
    requestAnimationFrame(loop);
    return;
  }
  const dt = Math.min(2.2, (now - lastTime) / 16.67 || 1);
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

modeButtons.forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  try { canvas.setPointerCapture(e.pointerId); } catch(_) {}
  jump();
});
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'Enter') {
    e.preventDefault();
    jump();
  }
  if (e.key === '1') setMode('easy');
  if (e.key === '2') setMode('hard');
  if (e.key === '3') setMode('harder');
});

initStars();
reset();
requestAnimationFrame(loop);

if (window.ArcadeAvatar) {
  ArcadeAvatar.mountGuide({
    rootId: 'land-avatar-guide',
    gameId: 'land-jump',
    title: 'Land Jump Mission',
    primaryLabel: 'Start jumping',
    messages: [
      'Pick Easy, Hard, or Harder before you start.',
      'Tap, click, or press Space to jump over meteors flying toward you.',
      'You can jump three times before landing: jump, double jump, then triple jump.',
      'Collect coins while you run. The longer you last, the more each coin is worth.',
      'Grab x2 powerups for a short coin boost.'
    ]
  });
}
