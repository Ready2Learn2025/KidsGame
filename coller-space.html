<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="ios-app.js"></script>
  <script src="avatar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <title>Coller Space - Design Your Spaceship!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Fredoka One', 'Comic Sans MS', cursive;
      min-height: 100vh;
      background: #070718;
      color: white;
      overflow-x: hidden;
      user-select: none;
    }
    
    #space-bg {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
      background: radial-gradient(ellipse at 30% 30%, #1a1060 0%, #080820 70%, #030310 100%);
    }
    
    .star-bg { 
      position: absolute; 
      background: white; 
      border-radius: 50%; 
      animation: twinkle ease-in-out infinite alternate; 
    }
    
    @keyframes twinkle { 
      from { opacity: 0.2; transform: scale(0.8); } 
      to { opacity: 1; transform: scale(1.3); } 
    }
    
    .wrap { 
      position: relative; 
      z-index: 1; 
      max-width: 1200px; 
      margin: 0 auto; 
      padding: 20px; 
    }
    
    header { 
      text-align: center; 
      margin-bottom: 20px; 
    }
    
    .title-main {
      font-size: 2.8rem; 
      color: #FFD700;
      text-shadow: 0 0 40px rgba(255,200,0,0.45), 4px 4px 0 rgba(0,0,0,0.4);
      animation: floatUp 1.6s ease-in-out infinite alternate;
      margin-bottom: 10px;
    }
    
    @keyframes floatUp { 
      from { transform: translateY(0) rotate(-1deg); } 
      to { transform: translateY(-12px) rotate(1deg); } 
    }
    
    .title-sub { 
      font-size: 1rem; 
      color: rgba(255,255,255,0.75); 
    }
    
    .container {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
      gap: 30px;
      margin-top: 30px;
      align-items: start;
    }
    
    /* CANVAS AREA */
    .canvas-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      min-width: 0;
    }
    
    .canvas-wrapper {
      background: rgba(255,255,255,0.08);
      border: 3px solid rgba(255,215,0,0.4);
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 0 30px rgba(255,200,0,0.12);
      position: relative;
      width: min(100%, 436px);
    }
    
    #canvas {
      display: block;
      background: linear-gradient(135deg, #1a1f4f 0%, #0d0e2b 100%);
      border-radius: 10px;
      cursor: crosshair;
      touch-action: none;
      width: 100%;
      height: auto;
    }
    
    .canvas-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .btn {
      font-family: inherit;
      font-size: 0.9rem;
      padding: 10px 16px;
      border: none;
      border-radius: 20px;
      background: #FFD700;
      color: #7A3800;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(255,200,0,0.3);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
    }
    
    .btn-secondary:hover {
      background: rgba(255,255,255,0.3);
    }
    
    /* CONTROLS PANEL */
    .controls-section {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,215,0,0.3);
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 0 20px rgba(255,200,0,0.1);
      min-width: 0;
    }
    .tool-shell {
      display: grid;
      grid-template-columns: 66px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }
    .tool-rail {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .tool-tab {
      width: 56px;
      height: 56px;
      border: 2px solid rgba(255,255,255,0.24);
      border-radius: 14px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 1.55rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.15s, border-color 0.15s;
    }
    .tool-tab:hover { transform: translateY(-2px); border-color: #FFD700; }
    .tool-tab.active {
      background: #FFD700;
      border-color: #FFD700;
      color: #7A3800;
      box-shadow: 0 0 16px rgba(255,215,0,0.35);
    }
    .tool-panel {
      min-height: 320px;
    }
    .tool-pane {
      display: none;
    }
    .tool-pane.active {
      display: block;
    }
    
    .control-group {
      margin-bottom: 20px;
    }
    
    .control-label {
      font-size: 1.1rem;
      color: #FFD700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* PAINT COLORS */
    .color-palette {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    
    .color-btn {
      aspect-ratio: 1;
      border: 3px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
    }
    
    .color-btn:hover {
      transform: scale(1.1);
    }
    
    .color-btn.active {
      border-color: white;
      box-shadow: 0 0 16px rgba(255,255,255,0.6);
    }
    
    .color-btn.active::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: white;
      text-shadow: 0 0 8px rgba(0,0,0,0.5);
    }
    
    /* BRUSH SIZE */
    .brush-size-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .size-btn {
      width: 40px;
      height: 40px;
      padding: 0;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }
    
    .size-btn:hover {
      border-color: #FFD700;
      background: rgba(255,215,0,0.2);
    }
    
    .size-btn.active {
      background: #FFD700;
      color: #7A3800;
      border-color: #FFD700;
    }
    
    /* GLITTER EFFECTS */
    .effect-btn {
      padding: 10px 14px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
      font-family: inherit;
    }
    
    .effect-btn:hover {
      background: rgba(255,255,255,0.2);
      border-color: #FFD700;
    }
    
    .effect-btn.active {
      background: rgba(255,215,0,0.3);
      border-color: #FFD700;
      color: #FFD700;
    }
    
    .effect-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    /* STICKERS */
    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    
    .sticker-btn {
      aspect-ratio: 1;
      font-size: 2rem;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-family: inherit;
    }
    
    .sticker-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: #FFD700;
      transform: scale(1.1);
    }
    
    .sticker-btn.active {
      background: rgba(255,215,0,0.2);
      border-color: #FFD700;
      box-shadow: 0 0 12px rgba(255,215,0,0.4);
    }
    
    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      .tool-shell {
        grid-template-columns: 1fr;
      }
      .tool-rail {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }
      .tool-tab {
        width: 50px;
        height: 50px;
      }
      
      .title-main {
        font-size: 2rem;
      }
    }
    
    .info-text {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      margin-top: 5px;
    }
    
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255,215,0,0.2);
      border: 1px solid rgba(255,215,0,0.4);
      color: #FFD700;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      transition: all 0.15s;
    }
    
    .back-btn:hover {
      background: rgba(255,215,0,0.3);
    }
  </style>
</head>
<body>
<div id="space-bg"></div>

<button class="back-btn" onclick="window.location.href='index.html'">← Back to Arcade</button>

<div class="wrap">
  <header>
    <div class="title-main">🎨 Coller Space 🚀</div>
    <div class="title-sub">Design your own spaceship!</div>
  </header>
  
  <div class="container">
    <!-- CANVAS -->
    <div class="canvas-section">
      <div class="canvas-wrapper">
        <canvas id="canvas" width="400" height="500"></canvas>
      </div>
    </div>
    
    <!-- CONTROLS -->
    <div class="controls-section">
      <div class="tool-shell">
        <div class="tool-rail" aria-label="Drawing tools">
          <button class="tool-tab active" type="button" title="Paint color" aria-label="Paint color" onclick="setTool('paint', this)">🎨</button>
          <button class="tool-tab" type="button" title="Brush size" aria-label="Brush size" onclick="setTool('brush', this)">✏️</button>
          <button class="tool-tab" type="button" title="Effects" aria-label="Effects" onclick="setTool('effects', this)">✨</button>
          <button class="tool-tab" type="button" title="Stickers" aria-label="Stickers" onclick="setTool('stickers', this)">🌟</button>
          <button class="tool-tab" type="button" title="Actions" aria-label="Actions" onclick="setTool('actions', this)">⚙️</button>
        </div>
        <div class="tool-panel">
          <div class="tool-pane active" data-tool-pane="paint">
            <div class="control-group">
              <div class="control-label">🎨 Paint Color</div>
              <div class="color-palette" id="colorPalette"></div>
            </div>
          </div>

          <div class="tool-pane" data-tool-pane="brush">
            <div class="control-group">
              <div class="control-label">✏️ Brush Size</div>
              <div class="brush-size-group">
                <button class="size-btn" onclick="setBrushSize(3, this)">S</button>
                <button class="size-btn active" onclick="setBrushSize(8, this)">M</button>
                <button class="size-btn" onclick="setBrushSize(15, this)">L</button>
                <button class="size-btn" onclick="setBrushSize(25, this)">XL</button>
              </div>
            </div>
          </div>

          <div class="tool-pane" data-tool-pane="effects">
            <div class="control-group">
              <div class="control-label">✨ Glitter & Effects</div>
              <div class="effect-options">
                <button class="effect-btn active" onclick="toggleEffect('none', this)">🖌️ Normal</button>
                <button class="effect-btn" onclick="toggleEffect('glitter', this)">✨ Glitter</button>
                <button class="effect-btn" onclick="toggleEffect('rainbow', this)">🌈 Rainbow</button>
                <button class="effect-btn" onclick="toggleEffect('glow', this)">💫 Glow</button>
              </div>
            </div>
          </div>

          <div class="tool-pane" data-tool-pane="stickers">
            <div class="control-group">
              <div class="control-label">🌟 Add Stickers</div>
              <p class="info-text">Tap a sticker, then tap the canvas.</p>
              <div class="sticker-grid" id="stickerGrid"></div>
            </div>
          </div>

          <div class="tool-pane" data-tool-pane="actions">
            <div class="control-group">
              <div class="control-label">⚙️ Canvas Actions</div>
              <div class="effect-options">
                <button class="btn" onclick="clearCanvas()">🗑️ Clear</button>
                <button class="btn btn-secondary" onclick="downloadCanvas()">💾 Save</button>
                <button class="btn btn-secondary" onclick="undoDrawing()">↶ Undo</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────
// CANVAS SETUP
// ─────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
let isDrawing = false;
let history = [];

// Paint settings
let paintColor = '#FFD700';
let brushSize = 8;
let currentEffect = 'none';
let selectedSticker = null;

// Colors
const COLORS = [
  '#FFD700', '#FF6B6B', '#FF9500', '#00D4FF', 
  '#00FF88', '#FF00FF', '#FFFFFF', '#87CEEB'
];

// Stickers
const STICKERS = ['🚀', '🛸', '⭐', '🌙', '💫', '🪐', '🛰️', '👽', '💥', '🌈', '💎', '🔮'];

// ─────────────────────────────────────
// INITIALIZE UI
// ─────────────────────────────────────
function setTool(tool, btn) {
  document.querySelectorAll('.tool-tab').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.tool-pane').forEach(pane => pane.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const pane = document.querySelector(`[data-tool-pane="${tool}"]`);
  if (pane) pane.classList.add('active');
}

function initColorPalette() {
  const palette = document.getElementById('colorPalette');
  COLORS.forEach(color => {
    const btn = document.createElement('button');
    btn.className = 'color-btn' + (color === paintColor ? ' active' : '');
    btn.style.backgroundColor = color;
    btn.onclick = () => selectColor(btn, color);
    palette.appendChild(btn);
  });
}

function selectColor(btn, color) {
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  paintColor = color;
}

function initStickerGrid() {
  const grid = document.getElementById('stickerGrid');
  STICKERS.forEach(sticker => {
    const btn = document.createElement('button');
    btn.className = 'sticker-btn';
    btn.textContent = sticker;
    btn.onclick = () => selectSticker(btn, sticker);
    grid.appendChild(btn);
  });
}

function selectSticker(btn, sticker) {
  document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedSticker = sticker;
}

function setBrushSize(size, btn) {
  brushSize = size;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function toggleEffect(effect, btn) {
  currentEffect = effect;
  document.querySelectorAll('.effect-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

// ─────────────────────────────────────
// DRAWING LOGIC
// ─────────────────────────────────────
function saveHistory() {
  history = [ctx.getImageData(0, 0, canvas.width, canvas.height)];
}

function drawSpaceshipBase() {}

function startDrawing(e) {
  e.preventDefault();
  if (history.length === 0) saveHistory();
  isDrawing = true;
  const pos = getCanvasPos(e);
  
  if (selectedSticker) {
    placeSticker(pos.x, pos.y);
  } else {
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }
}

function draw(e) {
  e.preventDefault();
  if (!isDrawing || selectedSticker) return;
  
  const pos = getCanvasPos(e);
  
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = brushSize;
  
  if (currentEffect === 'glitter') {
    // Add glitter effect
    ctx.strokeStyle = paintColor;
    ctx.globalAlpha = 0.8;
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    
    // Add sparkles
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    for (let i = 0; i < 3; i++) {
      const dx = (Math.random() - 0.5) * brushSize * 2;
      const dy = (Math.random() - 0.5) * brushSize * 2;
      ctx.beginPath();
      ctx.arc(pos.x + dx, pos.y + dy, Math.random() * 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else if (currentEffect === 'rainbow') {
    // Rainbow effect
    const hue = (Date.now() / 10) % 360;
    ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  } else if (currentEffect === 'glow') {
    // Glow effect
    ctx.shadowColor = paintColor;
    ctx.shadowBlur = 15;
    ctx.strokeStyle = paintColor;
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    ctx.shadowBlur = 0;
  } else {
    // Normal drawing
    ctx.strokeStyle = paintColor;
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  }
}

function stopDrawing(e) {
  if (e) e.preventDefault();
  isDrawing = false;
  ctx.closePath();
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  
  let clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

function placeSticker(x, y) {
  ctx.font = `${brushSize * 3}px Arial`;
  ctx.fillText(selectedSticker, x - brushSize, y + brushSize);
  selectedSticker = null;
  document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  history = [];
}

function undoDrawing() {
  if (history.length > 0) {
    const prevImage = history[history.length - 1];
    ctx.putImageData(prevImage, 0, 0);
    history.pop();
  }
}

function downloadCanvas() {
  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = 'my-spaceship.png';
  link.click();
}

// ─────────────────────────────────────
// EVENT LISTENERS
// ─────────────────────────────────────
canvas.addEventListener('mousedown', startDrawing);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDrawing);
canvas.addEventListener('mouseout', stopDrawing);

canvas.addEventListener('touchstart', startDrawing, { passive:false });
canvas.addEventListener('touchmove', draw, { passive:false });
canvas.addEventListener('touchend', stopDrawing, { passive:false });

// ─────────────────────────────────────
// SPACE BACKGROUND
// ─────────────────────────────────────
(function() {
  const bg = document.getElementById('space-bg');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    s.className = 'star-bg';
    const sz = Math.random() * 2.5 + 0.4;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random() * 100}%;top:${Math.random() * 100}%;animation-duration:${1.5 + Math.random() * 3}s;animation-delay:${Math.random() * 5}s;`;
    bg.appendChild(s);
  }
})();

// Initialize
initColorPalette();
initStickerGrid();

if (window.ArcadeAvatar) {
  ArcadeAvatar.mountGuide({
    rootId: 'ship-avatar-guide',
    gameId: 'coller-space',
    title: 'Color Ship Mission',
    primaryLabel: 'Start designing',
    messages: [
      'Use the side icons to choose colors, brush size, effects, stickers, or actions.',
      'Draw on the blank canvas to design your spaceship.',
      'Use the actions icon when you want to save, clear, or undo.'
    ]
  });
}
</script>

</body>
</html>
